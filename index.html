<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pasapalabra PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle, #001f3f, #000814);
  color: white;
  text-align: center;
}

h1 {
  color: #00d4ff;
  text-shadow: 0 0 10px #00d4ff;
}

#game {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 20px;
}

#rosco {
  position: relative;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  margin: auto;
}

.letra {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #00aaff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  transition: 0.3s;
}

.activa { transform: scale(1.2); box-shadow: 0 0 15px yellow; }
.correcta { background: green !important; }
.incorrecta { background: red !important; }

#panel {
  width: 300px;
}

#pregunta {
  margin-bottom: 15px;
}

input {
  padding: 10px;
  width: 90%;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

#timer {
  margin-top: 10px;
  font-size: 20px;
  color: #00d4ff;
}
</style>
</head>

<body>

<h1>🎮 PASAPALABRA PRO</h1>

<div id="game">
  <div id="rosco"></div>

  <div id="panel">
    <div id="pregunta"></div>
    <input type="text" id="respuesta" placeholder="Tu respuesta..." autofocus>
    <br>
    <button onclick="responder()">Responder</button>
    <button onclick="pasar()">Pasar</button>
    <div id="timer"></div>
  </div>
</div>

<script>

// 📚 Preguntas
const preguntas = [
{letra:"A", respuesta:"acuerdos", pregunta:"Empieza con A: Operaciones comerciales", estado:0},
{letra:"B", respuesta:"bienes", pregunta:"Empieza con B: Productos y servicios", estado:0},
{letra:"C", respuesta:"canal", pregunta:"Empieza con C: Lleva el producto al consumidor", estado:0},
{letra:"D", respuesta:"demanda", pregunta:"Empieza con D: El canal la satisface", estado:0},
{letra:"E", respuesta:"entorno", pregunta:"Empieza con E: Factores externos", estado:0},
{letra:"F", respuesta:"forma", pregunta:"Empieza con F: Estado del producto", estado:0},
{letra:"G", respuesta:"gestion", pregunta:"Empieza con G: Administración comercial", estado:0},
{letra:"H", respuesta:"hipermercados", pregunta:"Empieza con H: Grandes tiendas", estado:0},
{letra:"I", respuesta:"interorganizacional", pregunta:"Empieza con I: Relación entre empresas", estado:0},
{letra:"J", respuesta:"conjunto", pregunta:"Contiene la J: Grupo de elementos", estado:0},
{letra:"L", respuesta:"logistica", pregunta:"Empieza con L: Movimiento de productos", estado:0},
{letra:"M", respuesta:"macroambientales", pregunta:"Empieza con M: Factores externos", estado:0},
{letra:"N", respuesta:"nacionales", pregunta:"Empieza con N: Factores del país", estado:0},
{letra:"Ñ", respuesta:"mañana", pregunta:"Contiene la Ñ: Momento del día", estado:0},
{letra:"O", respuesta:"objetivos", pregunta:"Empieza con O: Metas", estado:0},
{letra:"P", respuesta:"poder", pregunta:"Empieza con P: Capacidad de influir", estado:0},
{letra:"Q", respuesta:"quiere", pregunta:"Contiene la Q: Lo que busca lograr", estado:0},
{letra:"R", respuesta:"rentabilidad", pregunta:"Empieza con R: Ganancia", estado:0},
{letra:"S", respuesta:"sistema", pregunta:"Empieza con S: Conjunto organizado", estado:0},
{letra:"T", respuesta:"tiempo", pregunta:"Empieza con T: Valor si llega tarde", estado:0},
{letra:"U", respuesta:"unidad", pregunta:"Empieza con U: Espacio promocional", estado:0},
{letra:"V", respuesta:"ventaja", pregunta:"Empieza con V: Beneficio", estado:0},
{letra:"X", respuesta:"mix", pregunta:"Contiene la X: Estrategia comercial", estado:0},
{letra:"Y", respuesta:"mayor", pregunta:"Contiene la Y: Más atención", estado:0},
{letra:"Z", respuesta:"organizacion", pregunta:"Contiene la Z: Grupo de personas", estado:0}
];

let actual = 0;
let tiempo = 120;

// 🎯 Crear rosco
const rosco = document.getElementById("rosco");
const radio = 180;
const centro = 225;

preguntas.forEach((p, i) => {
  const angulo = (i / preguntas.length) * 2 * Math.PI - Math.PI/2;
  const x = centro + radio * Math.cos(angulo) - 21;
  const y = centro + radio * Math.sin(angulo) - 21;

  const div = document.createElement("div");
  div.className = "letra";
  div.id = "letra-" + i;
  div.style.left = x + "px";
  div.style.top = y + "px";
  div.innerText = p.letra;

  rosco.appendChild(div);
});

// UI
function actualizarUI() {
  document.querySelectorAll(".letra").forEach(l => l.classList.remove("activa"));
  document.getElementById("letra-" + actual).classList.add("activa");
  document.getElementById("pregunta").innerText = preguntas[actual].pregunta;
}

// lógica
function siguiente() {
  let vueltas = 0;
  do {
    actual = (actual + 1) % preguntas.length;
    vueltas++;
  } while (preguntas[actual].estado !== 0 && vueltas < preguntas.length);
  actualizarUI();
}

function responder() {
  const input = document.getElementById("respuesta");
  const resp = input.value.toLowerCase().trim();
  if (!resp) return;

  const p = preguntas[actual];
  const letra = document.getElementById("letra-" + actual);

  if (resp === p.respuesta) {
    letra.classList.add("correcta");
    p.estado = 1;
  } else {
    letra.classList.add("incorrecta");
    p.estado = -1;
  }

  input.value = "";
  siguiente();
}

function pasar() {
  siguiente();
}

// teclado
document.addEventListener("keydown", function(e){
  if(e.key === "Enter") responder();
  if(e.code === "Space"){
    e.preventDefault();
    pasar();
  }
});

// timer
setInterval(()=>{
  tiempo--;
  document.getElementById("timer").innerText = "⏱️ " + tiempo + "s";

  if(tiempo <= 0){
    alert("⏱️ Tiempo terminado");
    location.reload();
  }
},1000);

// iniciar
actualizarUI();

</script>

</body>
</html>
