<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pasapalabra</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #001f3f;
  color: white;
  text-align: center;
}

/* INICIO */
#inicio {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#inicio h1 {
  font-size: 40px;
}

#inicio button {
  padding: 15px 30px;
  font-size: 20px;
}

/* JUEGO */
#game {
  display: none;
}

#rosco {
  position: relative;
  width: 90vw;
  height: 90vw;
  max-width: 350px;
  margin: auto;
}

.letra {
  position: absolute;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: blue;
  display: flex;
  align-items: center;
  justify-content: center;
}

.correcta { background: green; }
.incorrecta { background: red; }

button {
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="inicio">
  <h1>PASAPALABRA</h1>
  <button id="btnJugar">JUGAR</button>
</div>

<div id="game">
  <div id="rosco"></div>
  <div id="pregunta"></div>
  <input id="respuesta">
  <br>
  <button id="responderBtn">RESPONDER</button>
</div>

<script>
const preguntasBase = [
  {letra:"A", respuesta:"anuncio", pregunta:"Empieza con A"},
  {letra:"B", respuesta:"barato", pregunta:"Empieza con B"},
  {letra:"C", respuesta:"cliente", pregunta:"Empieza con C"}
];

let preguntas, actual = 0;

/* BOTÓN JUGAR */
document.getElementById("btnJugar").addEventListener("click", () => {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("game").style.display = "block";

  preguntas = preguntasBase.map(p => ({...p, estado:0}));

  crearRosco();
  mostrarPregunta();
});

/* ROSCO */
function crearRosco(){
  const rosco = document.getElementById("rosco");
  rosco.innerHTML = "";

  preguntas.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="letra";
    div.innerText=p.letra;
    div.style.left = (i*40)+"px";
    rosco.appendChild(div);
  });
}

/* PREGUNTA */
function mostrarPregunta(){
  document.getElementById("pregunta").innerText =
    preguntas[actual].pregunta;
}

/* RESPONDER */
document.getElementById("responderBtn").addEventListener("click", () => {
  const input = document.getElementById("respuesta");
  const resp = input.value.toLowerCase();

  if(resp === preguntas[actual].respuesta){
    alert("Correcto");
  } else {
    alert("Incorrecto");
  }

  input.value="";
});
</script>

</body>
</html>
