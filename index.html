<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosco Logístico</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle, #001f3f, #000814);
  color: white;
  text-align: center;
}

h1 {
  color: #00d4ff;
  font-size: 6vw;
}

#game {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 15px;
}

#rosco {
  position: relative;
  width: 90vw;
  height: 90vw;
  max-width: 380px;
  max-height: 380px;
  border-radius: 50%;
}

.letra {
  position: absolute;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #00aaff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.activa {
  transform: scale(1.3);
  box-shadow: 0 0 10px yellow;
}

.correcta { background: #00c853 !important; }
.incorrecta { background: #ff1744 !important; }

#panel {
  width: 90%;
  max-width: 350px;
}

#pregunta {
  min-height: 60px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.botones {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 16px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

#responderBtn { background: #00c853; }
#pasarBtn { background: #ff9100; }

#timer {
  margin-top: 10px;
  font-size: 20px;
  color: #00d4ff;
}

#resultado {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>Rosco Logístico</h1>

<div id="game">
  <div id="rosco"></div>

  <div id="panel">
    <div id="pregunta"></div>

    <input 
      type="text" 
      id="respuesta" 
      placeholder="Escribí tu respuesta..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      enterkeyhint="done"
    >

    <div class="botones">
      <button id="responderBtn">RESPONDER</button>
      <button id="pasarBtn">PASAR</button>
    </div>

    <div id="timer"></div>
    <div id="resultado"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const preguntas = [ 
  {letra:"A", respuesta:"anuncio", pregunta:"Empieza con A: Mensaje publicitario para vender algo", estado:0},
  {letra:"B", respuesta:"barato", pregunta:"Empieza con B: Producto que tiene un precio bajo", estado:0},
  {letra:"C", respuesta:"cliente", pregunta:"Empieza con C: Persona que compra un producto", estado:0},
  {letra:"D", respuesta:"descuento", pregunta:"Empieza con D: Rebaja en el precio de un artículo", estado:0},
  {letra:"E", respuesta:"envase", pregunta:"Empieza con E: Recipiente que protege al producto", estado:0},
  {letra:"F", respuesta:"fabrica", pregunta:"Empieza con F: Lugar donde se hacen los productos", estado:0},
  {letra:"G", respuesta:"gratis", pregunta:"Empieza con G: Algo que no cuesta dinero", estado:0},
  {letra:"H", respuesta:"horario", pregunta:"Empieza con H: Tiempo en que una tienda está abierta", estado:0},
  {letra:"I", respuesta:"internet", pregunta:"Empieza con I: Red para comprar online", estado:0},
  {letra:"J", respuesta:"tarjeta", pregunta:"Contiene la J: Objeto para pagar sin efectivo", estado:0},
  {letra:"L", respuesta:"logotipo", pregunta:"Empieza con L: Representa una marca", estado:0},
  {letra:"M", respuesta:"mercado", pregunta:"Empieza con M: Lugar de compra y venta", estado:0},
  {letra:"N", respuesta:"negocio", pregunta:"Empieza con N: Local comercial", estado:0},
  {letra:"Ñ", respuesta:"tamaño", pregunta:"Contiene la Ñ: Medida de un producto", estado:0},
  {letra:"O", respuesta:"oferta", pregunta:"Empieza con O: Promoción especial", estado:0},
  {letra:"P", respuesta:"precio", pregunta:"Empieza con P: Valor en dinero", estado:0},
  {letra:"Q", respuesta:"etiqueta", pregunta:"Contiene la Q: Información del producto", estado:0},
  {letra:"R", respuesta:"regalo", pregunta:"Empieza con R: Obsequio al cliente", estado:0},
  {letra:"S", respuesta:"servicio", pregunta:"Empieza con S: No es objeto físico", estado:0},
  {letra:"T", respuesta:"tienda", pregunta:"Empieza con T: Lugar donde se vende", estado:0},
  {letra:"U", respuesta:"usar", pregunta:"Empieza con U: Utilizar producto", estado:0},
  {letra:"V", respuesta:"vendedor", pregunta:"Empieza con V: Quien vende", estado:0},
  {letra:"X", respuesta:"exito", pregunta:"Contiene la X: Cuando algo va bien", estado:0},
  {letra:"Y", respuesta:"ayuda", pregunta:"Contiene la Y: Atención al cliente", estado:0},
  {letra:"Z", respuesta:"zapateria", pregunta:"Empieza con Z: Venta de calzado", estado:0} 
];

let actual = 0;
let tiempo = 120;
let intervalo;

const rosco = document.getElementById("rosco");
const input = document.getElementById("respuesta");

function vibrar(ms){
  if (navigator.vibrate) navigator.vibrate(ms);
}

function crearRosco(){
  const size = rosco.offsetWidth;
  if (!size || size < 100) return;

  rosco.innerHTML = "";

  const radio = size / 2 - 25;
  const centro = size / 2;

  preguntas.forEach((p, i) => {
    const angulo = (i / preguntas.length) * 2 * Math.PI - Math.PI/2;
    const x = centro + radio * Math.cos(angulo) - 19;
    const y = centro + radio * Math.sin(angulo) - 19;

    const div = document.createElement("div");
    div.className = "letra";
    div.id = "letra-" + i;
    div.style.left = x + "px";
    div.style.top = y + "px";
    div.innerText = p.letra;

    if (p.estado === 1) div.classList.add("correcta");
    if (p.estado === -1) div.classList.add("incorrecta");

    rosco.appendChild(div);
  });
}

function actualizarUI(){
  document.querySelectorAll(".letra").forEach(l => l.classList.remove("activa"));
  document.getElementById("letra-" + actual).classList.add("activa");
  document.getElementById("pregunta").innerText = preguntas[actual].pregunta;
  setTimeout(() => input.focus(), 100);
}

function siguiente(){
  let vueltas = 0;
  do {
    actual = (actual + 1) % preguntas.length;
    vueltas++;
  } while (preguntas[actual].estado !== 0 && vueltas < preguntas.length);
  actualizarUI();
}

function responder(){
  const resp = input.value.toLowerCase().trim();
  if (!resp) return;

  const p = preguntas[actual];
  const letra = document.getElementById("letra-" + actual);

  if (resp === p.respuesta){
    letra.classList.add("correcta");
    p.estado = 1;
    vibrar(50);
  } else {
    letra.classList.add("incorrecta");
    p.estado = -1;
    vibrar([100,50,100]);
  }

  input.value = "";

  if (preguntas.every(p => p.estado !== 0)){
    finalizarJuego();
    return;
  }

  siguiente();
}

function pasar(){
  vibrar(30);
  siguiente();
}

document.getElementById("responderBtn").onclick = responder;
document.getElementById("pasarBtn").onclick = pasar;

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    responder();
  }
});

function iniciarTimer(){
  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("timer").innerText = "⏱️ " + tiempo + "s";

    if (tiempo <= 0){
      finalizarJuego();
    }
  }, 1000);
}

function finalizarJuego(){
  clearInterval(intervalo);

  let correctas = preguntas.filter(p => p.estado === 1).length;
  let incorrectas = preguntas.filter(p => p.estado === -1).length;

  document.getElementById("resultado").innerHTML =
    `🏁 FIN<br>✅ ${correctas} | ❌ ${incorrectas}`;

  vibrar([200,100,200]);
}

function iniciarJuego(){
  crearRosco();
  actualizarUI();
}

window.addEventListener("resize", () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(crearRosco, 200);
});

iniciarJuego();
iniciarTimer();

});
</script>

</body>
</html>
