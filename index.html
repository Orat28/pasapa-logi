<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pasapalabra PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle, #001f3f, #000814);
  color: white;
  text-align: center;
}

h1 {
  color: #00d4ff;
  text-shadow: 0 0 10px #00d4ff;
}

#game {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 20px;
}

#rosco {
  position: relative;
  width: 450px;
  height: 450px;
  border-radius: 50%;
}

.letra {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #00aaff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  transition: 0.3s;
}

.activa {
  transform: scale(1.2);
  box-shadow: 0 0 15px yellow;
}

.correcta { background: green !important; }
.incorrecta { background: red !important; }

#panel {
  width: 300px;
}

input {
  padding: 10px;
  width: 90%;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

#timer {
  margin-top: 10px;
  font-size: 20px;
  color: #00d4ff;
}
</style>
</head>

<body>

<h1>🎮 PASAPALABRA PRO</h1>

<div id="game">
  <div id="rosco"></div>

  <div id="panel">
    <div id="pregunta"></div>
    <input type="text" id="respuesta" placeholder="Tu respuesta..." autofocus>
    <br>
    <button onclick="responder()">Responder</button>
    <button onclick="pasar()">Pasar</button>
    <div id="timer"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const preguntas = [
  {letra:"A", respuesta:"anuncio", pregunta:"Empieza con A: Mensaje publicitario para vender algo", estado:0},
  {letra:"B", respuesta:"barato", pregunta:"Empieza con B: Producto que tiene un precio bajo", estado:0},
  {letra:"C", respuesta:"cliente", pregunta:"Empieza con C: Persona que compra un producto", estado:0},
  {letra:"D", respuesta:"descuento", pregunta:"Empieza con D: Rebaja en el precio de un artículo", estado:0},
  {letra:"E", respuesta:"envase", pregunta:"Empieza con E: Recipiente que protege al producto", estado:0},
  {letra:"F", respuesta:"fabrica", pregunta:"Empieza con F: Lugar donde se hacen los productos", estado:0},
  {letra:"G", respuesta:"gratis", pregunta:"Empieza con G: Algo que no cuesta dinero", estado:0},
  {letra:"H", respuesta:"horario", pregunta:"Empieza con H: Tiempo en que una tienda está abierta", estado:0},
  {letra:"I", respuesta:"internet", pregunta:"Empieza con I: Red para comprar de forma online", estado:0},
  {letra:"J", respuesta:"tarjeta", pregunta:"Contiene la J: Objeto de plástico para pagar sin efectivo", estado:0},
  {letra:"L", respuesta:"logotipo", pregunta:"Empieza con L: Dibujo que representa a una marca", estado:0},
  {letra:"M", respuesta:"mercado", pregunta:"Empieza con M: Lugar físico o virtual de compra y venta", estado:0},
  {letra:"N", respuesta:"negocio", pregunta:"Empieza con N: Local comercial o tienda", estado:0},
  {letra:"Ñ", respuesta:"tamaño", pregunta:"Contiene la Ñ: Medida de un producto (pequeño, grande...)", estado:0},
  {letra:"O", respuesta:"oferta", pregunta:"Empieza con O: Promoción especial para atraer compradores", estado:0},
  {letra:"P", respuesta:"precio", pregunta:"Empieza con P: Valor en dinero de una cosa", estado:0},
  {letra:"Q", respuesta:"etiqueta", pregunta:"Contiene la Q: Papel pegado al producto con información o precio", estado:0},
  {letra:"R", respuesta:"regalo", pregunta:"Empieza con R: Obsequio que se da al cliente", estado:0},
  {letra:"S", respuesta:"servicio", pregunta:"Empieza con S: Lo que se ofrece y no es un objeto físico", estado:0},
  {letra:"T", respuesta:"tienda", pregunta:"Empieza con T: Establecimiento donde se venden cosas", estado:0},
  {letra:"U", respuesta:"usar", pregunta:"Empieza con U: Utilizar un producto después de comprarlo", estado:0},
  {letra:"V", respuesta:"vendedor", pregunta:"Empieza con V: Persona que entrega el producto por dinero", estado:0},
  {letra:"X", respuesta:"exito", pregunta:"Contiene la X: Cuando a un producto le va muy bien", estado:0},
  {letra:"Y", respuesta:"ayuda", pregunta:"Contiene la Y: Lo que pides al servicio de atención al cliente", estado:0},
  {letra:"Z", respuesta:"zapateria", pregunta:"Empieza con Z: Tienda donde se compran calzados", estado:0}
];
let actual = 0;
let tiempo = 120;
let intervalo;

// 🎯 Crear rosco
const rosco = document.getElementById("rosco");
const radio = 180;
const centro = 225;

preguntas.forEach((p, i) => {
  const angulo = (i / preguntas.length) * 2 * Math.PI - Math.PI/2;
  const x = centro + radio * Math.cos(angulo) - 21;
  const y = centro + radio * Math.sin(angulo) - 21;

  const div = document.createElement("div");
  div.className = "letra";
  div.id = "letra-" + i;
  div.style.left = x + "px";
  div.style.top = y + "px";
  div.innerText = p.letra;

  rosco.appendChild(div);
});

// UI
function actualizarUI() {
  document.querySelectorAll(".letra").forEach(l => l.classList.remove("activa"));
  document.getElementById("letra-" + actual).classList.add("activa");
  document.getElementById("pregunta").innerText = preguntas[actual].pregunta;
}

// lógica
function siguiente() {
  let vueltas = 0;
  do {
    actual = (actual + 1) % preguntas.length;
    vueltas++;
  } while (preguntas[actual].estado !== 0 && vueltas < preguntas.length);
  actualizarUI();
}

window.responder = function() {
  const input = document.getElementById("respuesta");
  const resp = input.value.toLowerCase().trim();
  if (!resp) return;

  const p = preguntas[actual];
  const letra = document.getElementById("letra-" + actual);

  if (resp === p.respuesta) {
    letra.classList.add("correcta");
    p.estado = 1;
  } else {
    letra.classList.add("incorrecta");
    p.estado = -1;
  }

  input.value = "";

  // terminar si ya respondió todo
  if (preguntas.every(p => p.estado !== 0)) {
    clearInterval(intervalo);
    finalizarJuego();
    return;
  }

  siguiente();
};

window.pasar = function() {
  siguiente();
};

// teclado
document.addEventListener("keydown", function(e){
  if(e.key === "Enter") responder();
  if(e.code === "Space"){
    e.preventDefault();
    pasar();
  }
});

// ⏱️ timer REAL
function iniciarTimer(){
  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("timer").innerText = "⏱️ " + tiempo + "s";

    if (tiempo <= 0) {
      clearInterval(intervalo);
      finalizarJuego();
    }
  }, 1000);
}

// 🏁 final
function finalizarJuego(){
  let correctas = preguntas.filter(p => p.estado === 1).length;
  let incorrectas = preguntas.filter(p => p.estado === -1).length;

  alert(
    "🏁 FIN DEL JUEGO\n\n" +
    "✅ Correctas: " + correctas + "\n" +
    "❌ Incorrectas: " + incorrectas
  );

  location.reload();
}

// iniciar
actualizarUI();
iniciarTimer();

});
</script>

</body>
</html>
