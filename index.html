```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasapalabra Logística</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#001f3f;
  color:white;
  text-align:center;
}

/* INICIO */
#inicio{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#inicio button{
  padding:15px 30px;
  font-size:20px;
}

/* JUEGO */
#game{
  display:none;
  padding:10px;
}

#rosco{
  position:relative;
  width:90vw;
  height:90vw;
  max-width:380px;
  margin:auto;
}

.letra{
  position:absolute;
  width:38px;
  height:38px;
  border-radius:50%;
  background:#00aaff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.activa{
  transform:scale(1.3);
  box-shadow:0 0 10px yellow;
}

.correcta{background:#00c853;}
.incorrecta{background:#ff1744;}

input{
  width:90%;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.botones{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:10px;
}

#responderBtn{background:#00c853;}
#pasarBtn{background:#ff9100;}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <h1>PASAPALABRA</h1>
  <button id="btnJugar">JUGAR</button>
</div>

<!-- JUEGO -->
<div id="game">
  <div id="rosco"></div>
  <div id="pregunta"></div>

  <input id="respuesta" placeholder="Responder...">

  <div class="botones">
    <button id="responderBtn">RESPONDER</button>
    <button id="pasarBtn">PASAR</button>
  </div>

  <div id="timer"></div>
  <div id="resultado"></div>
</div>

<script>
const preguntasBase = [
{letra:"A", respuesta:"anuncio", pregunta:"Empieza con A: Mensaje publicitario", estado:0},
{letra:"B", respuesta:"barato", pregunta:"Empieza con B: Precio bajo", estado:0},
{letra:"C", respuesta:"cliente", pregunta:"Empieza con C: Persona que compra", estado:0},
{letra:"D", respuesta:"descuento", pregunta:"Empieza con D: Rebaja", estado:0},
{letra:"E", respuesta:"envase", pregunta:"Empieza con E: Protege producto", estado:0},
{letra:"F", respuesta:"fabrica", pregunta:"Empieza con F: Lugar de producción", estado:0},
{letra:"G", respuesta:"gratis", pregunta:"Empieza con G: Sin costo", estado:0},
{letra:"H", respuesta:"horario", pregunta:"Empieza con H: Tiempo abierto", estado:0},
{letra:"I", respuesta:"internet", pregunta:"Empieza con I: Compras online", estado:0},
{letra:"J", respuesta:"tarjeta", pregunta:"Contiene J: Pago electrónico", estado:0},
{letra:"L", respuesta:"logotipo", pregunta:"Empieza con L: Marca visual", estado:0},
{letra:"M", respuesta:"mercado", pregunta:"Empieza con M: Compra y venta", estado:0},
{letra:"N", respuesta:"negocio", pregunta:"Empieza con N: Comercio", estado:0},
{letra:"Ñ", respuesta:"tamaño", pregunta:"Contiene Ñ: Medida", estado:0},
{letra:"O", respuesta:"oferta", pregunta:"Empieza con O: Promoción", estado:0},
{letra:"P", respuesta:"precio", pregunta:"Empieza con P: Valor", estado:0},
{letra:"Q", respuesta:"etiqueta", pregunta:"Contiene Q: Info producto", estado:0},
{letra:"R", respuesta:"regalo", pregunta:"Empieza con R: Obsequio", estado:0},
{letra:"S", respuesta:"servicio", pregunta:"Empieza con S: No tangible", estado:0},
{letra:"T", respuesta:"tienda", pregunta:"Empieza con T: Lugar venta", estado:0},
{letra:"U", respuesta:"usar", pregunta:"Empieza con U: Utilizar", estado:0},
{letra:"V", respuesta:"vendedor", pregunta:"Empieza con V: Quien vende", estado:0},
{letra:"X", respuesta:"exito", pregunta:"Contiene X: Buen resultado", estado:0},
{letra:"Y", respuesta:"ayuda", pregunta:"Contiene Y: Atención cliente", estado:0},
{letra:"Z", respuesta:"zapateria", pregunta:"Empieza con Z: Venta calzado", estado:0}
];

let preguntas, actual, tiempo, intervalo;

const rosco = document.getElementById("rosco");
const input = document.getElementById("respuesta");

/* VIBRAR */
function vibrar(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* INICIO */
document.getElementById("btnJugar").addEventListener("click", ()=>{
  document.getElementById("inicio").style.display="none";
  document.getElementById("game").style.display="block";

  preguntas = preguntasBase.map(p => ({...p}));
  actual = 0;
  tiempo = 120;

  crearRosco();
  actualizarUI();
  iniciarTimer();
});

/* ROSCO */
function crearRosco(){
  rosco.innerHTML="";
  const size = rosco.offsetWidth;
  const radio = size/2 - 25;
  const centro = size/2;

  preguntas.forEach((p,i)=>{
    const ang = (i/preguntas.length)*2*Math.PI - Math.PI/2;
    const x = centro + radio*Math.cos(ang) - 19;
    const y = centro + radio*Math.sin(ang) - 19;

    const div=document.createElement("div");
    div.className="letra";
    div.id="letra-"+i;
    div.style.left=x+"px";
    div.style.top=y+"px";
    div.innerText=p.letra;

    if(p.estado===1) div.classList.add("correcta");
    if(p.estado===-1) div.classList.add("incorrecta");

    rosco.appendChild(div);
  });
}

/* UI */
function actualizarUI(){
  document.querySelectorAll(".letra").forEach(l=>l.classList.remove("activa"));
  document.getElementById("letra-"+actual).classList.add("activa");
  document.getElementById("pregunta").innerText=preguntas[actual].pregunta;
}

/* SIGUIENTE */
function siguiente(){
  let vueltas=0;
  do{
    actual=(actual+1)%preguntas.length;
    vueltas++;
  }while(preguntas[actual].estado!==0 && vueltas<preguntas.length);

  actualizarUI();
}

/* RESPONDER */
document.getElementById("responderBtn").addEventListener("click", ()=>{
  const resp=input.value.toLowerCase().trim();
  if(!resp) return;

  const p=preguntas[actual];
  const letra=document.getElementById("letra-"+actual);

  if(resp===p.respuesta){
    letra.classList.add("correcta");
    p.estado=1;
    vibrar(50);
  }else{
    letra.classList.add("incorrecta");
    p.estado=-1;
    vibrar([100,50,100]);
  }

  input.value="";

  if(preguntas.every(p=>p.estado!==0)){
    finalizar();
    return;
  }

  siguiente();
});

/* PASAR */
document.getElementById("pasarBtn").addEventListener("click", ()=>{
  vibrar(30);
  siguiente();
});

/* ENTER */
input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    document.getElementById("responderBtn").click();
  }
});

/* TIMER */
function iniciarTimer(){
  intervalo=setInterval(()=>{
    tiempo--;
    document.getElementById("timer").innerText="⏱ "+tiempo+"s";

    if(tiempo<=0) finalizar();
  },1000);
}

/* FINAL */
function finalizar(){
  clearInterval(intervalo);

  let c=preguntas.filter(p=>p.estado===1).length;
  let i=preguntas.filter(p=>p.estado===-1).length;

  document.getElementById("resultado").innerHTML =
    `🏁 FIN<br>✅ ${c} | ❌ ${i}`;

  vibrar([200,100,200]);
}

/* RESIZE (sin romper colores) */
window.addEventListener("resize", ()=>{
  clearTimeout(window._r);
  window._r=setTimeout(crearRosco,200);
});
</script>

</body>
</html>
